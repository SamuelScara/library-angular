<mat-toolbar>
  <span>Reservations</span>
</mat-toolbar>

<div style="padding: 24px">
  <table mat-table [dataSource]="reservations" style="width: 100%">

    <ng-container matColumnDef="book">
      <th mat-header-cell *matHeaderCellDef>Book</th>
      <td mat-cell *matCellDef="let r">{{ r.bookTitle }}</td>
    </ng-container>

    <ng-container matColumnDef="dateFrom">
      <th mat-header-cell *matHeaderCellDef>From</th>
      <td mat-cell *matCellDef="let r">{{ r.dateFrom }}</td>
    </ng-container>

    <ng-container matColumnDef="dateTo">
      <th mat-header-cell *matHeaderCellDef>To</th>
      <td mat-cell *matCellDef="let r">{{ r.dateTo }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let r">
        <mat-chip highlighted>{{ r.status }}</mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let r">
        <ng-container *ngIf="r.status === 'PENDING'">
          <button mat-button color="primary" (click)="setStatus(r.id, 'APPROVED')">Approve</button>
          <button mat-button color="warn" (click)="setStatus(r.id, 'REJECTED')">Reject</button>
        </ng-container>
        <ng-container *ngIf="r.status === 'APPROVED'">
          <button mat-button (click)="setStatus(r.id, 'RETURNED')">Mark returned</button>
        </ng-container>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
  </table>
</div>
