<div class="login-container">
  <mat-card style="width: 360px">
    <br/>
    <mat-card-title>Sign up</mat-card-title>
    <br/>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" style="width: 100%">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" />
          <mat-error *ngIf="form.get('username')?.hasError('required')">Camp required</mat-error>
          <mat-error *ngIf="form.get('username')?.hasError('minlength')">Min 3 characters</mat-error>
          <mat-error *ngIf="form.get('username')?.hasError('taken')">Username already taken</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" style="width: 100%">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" />
          <mat-error *ngIf="form.get('email')?.hasError('required')">Camp required</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">Email not valid</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('taken')">Email already taken</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" style="width: 100%">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" />
          <mat-error *ngIf="form.get('password')?.hasError('required')">Camp required</mat-error>
          <mat-error *ngIf="form.get('password')?.hasError('minlength')">Min 6 characters</mat-error>
        </mat-form-field>
        <p *ngIf="errorMessage" style="color: red">{{ errorMessage }}</p>
        <button mat-flat-button color="primary" type="submit" style="width: 100%"
                [disabled]="form.invalid">
          Sign up
        </button>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <a routerLink="/login">Already registered, sign in</a>
    </mat-card-actions>
  </mat-card>
</div>
