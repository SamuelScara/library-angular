<h2 mat-dialog-title>Books by {{ author.firstName }} {{ author.lastName }}</h2>

<mat-dialog-content>
  <p *ngIf="books.length === 0">No books found for this author.</p>
  <table mat-table [dataSource]="books" style="width: 100%;" *ngIf="books.length > 0">

    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef>Title</th>
      <td mat-cell *matCellDef="let b">{{ b.title }}</td>
    </ng-container>

    <ng-container matColumnDef="isbn">
      <th mat-header-cell *matHeaderCellDef>ISBN</th>
      <td mat-cell *matCellDef="let b">{{ b.isbn }}</td>
    </ng-container>

    <ng-container matColumnDef="pubYear">
      <th mat-header-cell *matHeaderCellDef>Year</th>
      <td mat-cell *matCellDef="let b">{{ b.pubYear }}</td>
    </ng-container>

    <ng-container matColumnDef="availability">
      <th mat-header-cell *matHeaderCellDef>Available</th>
      <td mat-cell *matCellDef="let b">{{ b.availability ? 'Yes' : 'No' }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
  </table>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Close</button>
</mat-dialog-actions>
