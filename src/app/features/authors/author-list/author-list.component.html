<mat-toolbar>
  <span>Authors</span>
  <span style="flex: 1"></span>
  <button mat-flat-button color="primary" (click)="openForm()">Add</button>
</mat-toolbar>

<table mat-table [dataSource]="authors" style="width: 100%;">

  <ng-container matColumnDef="firstName">
    <th mat-header-cell *matHeaderCellDef>First name</th>
    <td mat-cell *matCellDef="let a">{{ a.firstName }}</td>
  </ng-container>

  <ng-container matColumnDef="lastName">
    <th mat-header-cell *matHeaderCellDef>Last name</th>
    <td mat-cell *matCellDef="let a">{{ a.lastName }}</td>
  </ng-container>

  <ng-container matColumnDef="nationality">
    <th mat-header-cell *matHeaderCellDef>Nationality</th>
    <td mat-cell *matCellDef="let a">{{ a.nationality }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let a">
      <button mat-icon-button color="warn" (click)="openEditForm(a)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="openBooksDialog(a)">
        <mat-icon>info</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="openAssignBooksDialog(a)">
        <mat-icon>library_add</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="delete(a.id)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columns"></tr>
  <tr mat-row *matRowDef="let row; columns: columns"></tr> 
</table>
