<mat-toolbar>
  <span>Books</span>
  <span style="flex: 1"></span>
  <button mat-flat-button color="primary" (click)="openForm()">Add</button>
</mat-toolbar>

<table mat-table [dataSource]="books" style="width: 100%;">

  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef>Title</th>
    <td mat-cell *matCellDef="let b">{{ b.title }}</td>
  </ng-container>

  <ng-container matColumnDef="isbn">
    <th mat-header-cell *matHeaderCellDef>ISBN</th>
    <td mat-cell *matCellDef="let b">{{ b.isbn }}</td>
  </ng-container>

  <ng-container matColumnDef="pubYear">
    <th mat-header-cell *matHeaderCellDef>Year</th>
    <td mat-cell *matCellDef="let b">{{ b.pubYear }}</td>
  </ng-container>

  <ng-container matColumnDef="authors">
    <th mat-header-cell *matHeaderCellDef>Authors</th>
    <td mat-cell *matCellDef="let b">
      {{ b.authors?.map(a => a.firstName + ' ' + a.lastName).join(', ') || '-' }}
    </td>
  </ng-container>
  
  <ng-container matColumnDef="availability">
    <th mat-header-cell *matHeaderCellDef>Availability</th>
    <td mat-cell *matCellDef="let b">{{ b.availability }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let b">
      <button mat-icon-button color="warn" (click)="openEditForm(b)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="delete(b.id)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columns"></tr>
  <tr mat-row *matRowDef="let row; columns: columns"></tr> 
</table>
