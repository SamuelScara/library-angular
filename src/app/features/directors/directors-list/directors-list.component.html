<mat-toolbar>
  <span>Directors</span>
  <span style="flex: 1;"></span>
  <button mat-flat-button color="primary" (click)="openForm()">Add</button>
</mat-toolbar>

<table mat-table [dataSource]="directors" multiTemplateDataRows style="width: 100%;">

  <ng-container matColumnDef="firstName">
    <th mat-header-cell *matHeaderCellDef>First name</th>
    <td mat-cell *matCellDef="let d">{{ d.firstName }}</td>
  </ng-container>

  <ng-container matColumnDef="lastName">
    <th mat-header-cell *matHeaderCellDef>Last name</th>
    <td mat-cell *matCellDef="let d">{{ d.lastName }}</td>
  </ng-container>

  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef>Email</th>
    <td mat-cell *matCellDef="let d">{{ d.email }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let d">
      <button mat-icon-button (click)="toggleExpand(d)" [disabled]="!d.libId">
        <mat-icon>{{ expandedDirector === d ? 'expand_less' : 'expand_more' }}</mat-icon>
      </button>
      <button mat-icon-button color="primary" (click)="openEditForm(d)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="delete(d.id)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <ng-container matColumnDef="expandedDetail">
    <td mat-cell *matCellDef="let d" [attr.colspan]="columns.length" class="expanded-cell">
      <div *ngIf="expandedDirector === d" class="expanded-panel">
        <p *ngIf="d.lib === null" class="no-lib-msg">No library assigned.</p>
        <p *ngIf="d.lib === undefined && d.libId" class="no-lib-msg">Loading...</p>
        <mat-card *ngIf="d.lib" class="lib-card">
          <mat-card-header>
            <mat-card-title>{{ d.lib.name }}</mat-card-title>
            <mat-card-subtitle>{{ d.lib.city }}</mat-card-subtitle>
          </mat-card-header>
          <mat-card-content>
            <span class="lib-address">{{ d.lib.address }}</span>
          </mat-card-content>
        </mat-card>
      </div>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columns"></tr>
  <tr mat-row *matRowDef="let row; columns: columns"></tr>
  <tr mat-row *matRowDef="let row; columns: ['expandedDetail']" style="height: 0"></tr>
</table>
