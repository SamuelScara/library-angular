<h2 mat-dialog-title>Assign Books — {{ lib.name }}</h2>

<mat-dialog-content>

  <p><strong>To be assigned</strong></p>
  <mat-list>
    <mat-list-item *ngFor="let b of stagedBooks">
      <mat-icon matListItemIcon>book</mat-icon>
      <span matListItemTitle>{{ b.title }}</span>
      <span matListItemLine>{{ b.isbn }} — {{ b.pubYear }}</span>
      <button matListItemMeta mat-icon-button color="warn" (click)="unstageBook(b)">
        <mat-icon>undo</mat-icon>
      </button>
    </mat-list-item>
    <mat-list-item *ngIf="stagedBooks.length === 0">
      <span matListItemTitle style="color: gray">No books staged</span>
    </mat-list-item>
  </mat-list>

  <p><strong>Available books</strong></p>
  <mat-list>
    <mat-list-item *ngFor="let b of availableBooks">
      <mat-icon matListItemIcon>book</mat-icon>
      <span matListItemTitle>{{ b.title }}</span>
      <span matListItemLine>{{ b.isbn }} — {{ b.pubYear }}</span>
      <button matListItemMeta mat-icon-button color="primary" (click)="stageBook(b)">
        <mat-icon>add</mat-icon>
      </button>
    </mat-list-item>
    <mat-list-item *ngIf="availableBooks.length === 0">
      <span matListItemTitle style="color: gray">No books available to add</span>
    </mat-list-item>
  </mat-list>

</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" [disabled]="!hasPendingChanges" (click)="save()">Save</button>
</mat-dialog-actions>
