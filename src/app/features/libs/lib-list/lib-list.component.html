<mat-toolbar>
  <span>Libraries</span>
  <span style="flex: 1"></span>
  <button mat-flat-button color="primary" (click)="openForm()">Add</button>
</mat-toolbar>

<div style="display: flex; gap: 16px; padding: 16px 16px 0">
    <mat-form-field appearance="outline" style="flex: 1">
      <mat-label>Search by name</mat-label>
      <input matInput [formControl]="nameSearch" />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <mat-form-field appearance="outline" style="flex: 1">
      <mat-label>Search by book</mat-label>
      <input matInput [formControl]="bookSearch" />
      <mat-icon matSuffix>book</mat-icon>
    </mat-form-field>
  </div>

<mat-accordion>
  <mat-expansion-panel *ngFor="let l of filteredLibs">

    <mat-expansion-panel-header>
      <mat-panel-title>{{ l.name }}</mat-panel-title>
      <mat-panel-description >
        <ng-container *ngIf="l.director"> <strong>Director:</strong>&nbsp; {{ l.director.firstName }} {{ l.director.lastName }}</ng-container>
        <ng-container *ngIf="!l.director"> No director</ng-container>
      </mat-panel-description>
      <mat-panel-description><strong>Address:</strong>&nbsp; {{ l.city }} — {{ l.address }}</mat-panel-description>
    </mat-expansion-panel-header>

    <mat-list>
      <mat-list-item *ngFor="let b of l.books">
        <mat-icon matListItemIcon>book</mat-icon>
        <span matListItemTitle>{{ b.title }}</span>
        <span matListItemLine>{{ b.isbn }} · {{ b.pubYear }}</span>
        <button matListItemMeta mat-icon-button color="warn" (click)="openBookInfoDialog(b)">
          <mat-icon>info</mat-icon>
        </button>
        <button matListItemMeta mat-icon-button color="warn" (click)="unassignBookFromLib(l, b.id)">
          <mat-icon>remove</mat-icon>
        </button>
      </mat-list-item>
      <mat-list-item *ngIf="!l.books || l.books.length === 0">
        <span matListItemTitle style="color: gray">No books assigned</span>
      </mat-list-item>
    </mat-list>

    <mat-action-row>
      <button mat-icon-button color="primary" (click)="openEditForm(l)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="primary" (click)="openAssignDirectorDialog(l)">
        <mat-icon>person</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="delete(l.id)">
        <mat-icon>delete</mat-icon>
      </button>
      <button mat-flat-button color="primary" (click)="openAssignBooksDialog(l)">Add Books</button>
    </mat-action-row>

  </mat-expansion-panel>
</mat-accordion>
