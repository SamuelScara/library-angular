<ng-container *ngIf="author; else loading">
  <div class="profile-container">
    <div class="profile-card">

      <div class="profile-header">
        <mat-icon class="profile-icon">person</mat-icon>
        <div class="header-info">
          <h2>{{ author.firstName }} {{ author.lastName }}</h2>
          <p>{{ author.nationality }}</p>
        </div>
        <button mat-stroked-button (click)="openEditForm()">
          <mat-icon>edit</mat-icon> Edit profile
        </button>
      </div>

      <div class="books-section">
        <h3>My Books</h3>
        <p *ngIf="books.length === 0" class="empty-msg">No books assigned yet.</p>
        <table mat-table [dataSource]="books" *ngIf="books.length > 0" class="books-table">

          <ng-container matColumnDef="title">
            <th mat-header-cell *matHeaderCellDef>Title</th>
            <td mat-cell *matCellDef="let b">{{ b.title }}</td>
          </ng-container>

          <ng-container matColumnDef="isbn">
            <th mat-header-cell *matHeaderCellDef>ISBN</th>
            <td mat-cell *matCellDef="let b">{{ b.isbn }}</td>
          </ng-container>

          <ng-container matColumnDef="pubYear">
            <th mat-header-cell *matHeaderCellDef>Year</th>
            <td mat-cell *matCellDef="let b">{{ b.pubYear }}</td>
          </ng-container>

          <ng-container matColumnDef="availability">
            <th mat-header-cell *matHeaderCellDef>Available</th>
            <td mat-cell *matCellDef="let b">{{ b.availability ? 'Yes' : 'No' }}</td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="bookColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: bookColumns"></tr>
        </table>
      </div>

    </div>
  </div>
</ng-container>

<ng-template #loading>
  <div class="profile-container">
    <p class="empty-msg">Loading...</p>
  </div>
</ng-template>
