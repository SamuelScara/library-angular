<mat-toolbar>
  <span>My reservations</span>
</mat-toolbar>

<div style="padding: 24px">
  <p *ngIf="reservations.length === 0" style="color: grey">No reservations found.</p>

  <table mat-table [dataSource]="reservations" *ngIf="reservations.length > 0" style="width: 100%">

    <ng-container matColumnDef="book">
      <th mat-header-cell *matHeaderCellDef>Book</th>
      <td mat-cell *matCellDef="let r">{{ r.bookTitle }}</td>
    </ng-container>

    <ng-container matColumnDef="dateFrom">
      <th mat-header-cell *matHeaderCellDef>From</th>
      <td mat-cell *matCellDef="let r">{{ r.dateFrom }}</td>
    </ng-container>

    <ng-container matColumnDef="dateTo">
      <th mat-header-cell *matHeaderCellDef>To</th>
      <td mat-cell *matCellDef="let r">{{ r.dateTo }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let r">
        <mat-chip [color]="statusColor(r.status)" highlighted>{{ r.status }}</mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let r">
        <button mat-button color="warn" *ngIf="r.status === 'PENDING'" (click)="cancel(r.id)">
          Cancel
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
  </table>
</div>
